name: iOS IPA Build and Publish

on:
  workflow_dispatch:

jobs:
  validate-credentials:
    runs-on: macos-15

    env:
      PROJECT_PATH: src/app/ShadersCamera.csproj
      CERTIFICATE_PATH: ${{ github.workspace }}/ios-signing.p12
      PROFILE_PATH: ${{ github.workspace }}/ios-signing.mobileprovision
      PROFILE_PLIST_PATH: ${{ github.workspace }}/ios-signing-profile.plist
      KEYCHAIN_PATH: ${{ github.workspace }}/ios-signing.keychain-db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Decode signing assets
        shell: bash
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
        run: |
          decode_secret() {
            local env_name="$1"
            local out_file="$2"
            local raw_value="${!env_name:-}"

            if [[ -z "$raw_value" ]]; then
              echo "Required secret '$env_name' is missing or empty."
              exit 1
            fi

            local compact_value
            compact_value="$(printf '%s' "$raw_value" | tr -d '[:space:]')"

            if ! printf '%s' "$compact_value" | base64 --decode > "$out_file" 2>/dev/null; then
              echo "Secret '$env_name' is not valid base64. Recreate it from the source file and paste full value."
              exit 1
            fi
          }

          decode_secret IOS_P12_BASE64 "$CERTIFICATE_PATH"
          decode_secret IOS_MOBILEPROVISION_BASE64 "$PROFILE_PATH"

      - name: Validate signing materials
        shell: bash
        run: |
          KEYCHAIN_PASSWORD="$(uuidgen)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "${{ secrets.IOS_P12_PASSWORD }}" -f pkcs12 -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          IDENTITIES_OUTPUT="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true)"
          echo "$IDENTITIES_OUTPUT"

          if echo "$IDENTITIES_OUTPUT" | grep -q "0 valid identities found"; then
            echo "No valid code-signing identity found in imported p12."
            echo "Your IOS_P12_BASE64 likely does not include an Apple Distribution certificate + private key pair."
            exit 1
          fi

          if ! echo "$IDENTITIES_OUTPUT" | grep -F "${{ secrets.IOS_CODESIGN_KEY }}" >/dev/null; then
            echo "Configured IOS_CODESIGN_KEY was not found among imported identities."
            echo "IOS_CODESIGN_KEY must exactly match one identity line shown above."
            exit 1
          fi

          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST_PATH"

          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PROFILE_PLIST_PATH")"
          PROFILE_APP_ID="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$PROFILE_PLIST_PATH")"
          APP_BUNDLE_ID="$(python3 -c 'import os, xml.etree.ElementTree as ET; root = ET.parse(os.environ["PROJECT_PATH"]).getroot(); print(next((node.text.strip() for group in root.findall("PropertyGroup") for node in [group.find("ApplicationId")] if node is not None and node.text), ""))')"

          PROFILE_BUNDLE_PATTERN="${PROFILE_APP_ID#*.}"

          if [[ "$PROFILE_BUNDLE_PATTERN" == '*' ]]; then
            :
          elif [[ "$PROFILE_BUNDLE_PATTERN" == *'.*' ]]; then
            PROFILE_PREFIX="${PROFILE_BUNDLE_PATTERN%.*}"
            if [[ "$APP_BUNDLE_ID" != "$PROFILE_PREFIX".* ]]; then
              echo "Provisioning profile wildcard '$PROFILE_APP_ID' does not match bundle id '$APP_BUNDLE_ID'."
              exit 1
            fi
          elif [[ "$PROFILE_BUNDLE_PATTERN" != "$APP_BUNDLE_ID" ]]; then
            echo "Provisioning profile app identifier '$PROFILE_APP_ID' does not match bundle id '$APP_BUNDLE_ID'."
            exit 1
          fi

          echo "Validated signing identity and provisioning profile: $PROFILE_NAME"

      - name: Validate App Store Connect credentials
        shell: bash
        run: |
          if [[ -z "${{ secrets.APPSTORE_USERNAME }}" ]]; then
            echo "Repository secret APPSTORE_USERNAME is not set."
            exit 1
          fi

          if [[ -z "${{ secrets.APPSTORE_APP_PASSWORD }}" ]]; then
            echo "Repository secret APPSTORE_APP_PASSWORD is not set."
            exit 1
          fi

          ALTOOL_ARGS=(
            --list-providers
            --username "${{ secrets.APPSTORE_USERNAME }}"
            --app-password "@env:APPSTORE_APP_PASSWORD"
            --output-format json
          )

          APPSTORE_APP_PASSWORD="${{ secrets.APPSTORE_APP_PASSWORD }}" xcrun altool "${ALTOOL_ARGS[@]}" >/dev/null

          echo "Validated App Store Connect username and app-specific password."

      - name: Cleanup validation assets
        if: always()
        shell: bash
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$CERTIFICATE_PATH" "$PROFILE_PATH" "$PROFILE_PLIST_PATH"

  build-ios:
    needs: validate-credentials
    runs-on: macos-15

    env:
      PROJECT_PATH: src/app/ShadersCamera.csproj
      TARGET_FRAMEWORK: net10.0-ios
      OUTPUT_DIR: artifacts/ios-appstore
      CERTIFICATE_PATH: ${{ github.workspace }}/ios-signing.p12
      PROFILE_PATH: ${{ github.workspace }}/ios-signing.mobileprovision
      PROFILE_PLIST_PATH: ${{ github.workspace }}/ios-signing-profile.plist
      KEYCHAIN_PATH: ${{ github.workspace }}/ios-signing.keychain-db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET from global.json
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Select Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Show Xcode version
        shell: bash
        run: xcodebuild -version

      - name: Install MAUI workload
        shell: bash
        run: dotnet workload install maui

      - name: Decode signing assets
        shell: bash
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
        run: |
          decode_secret() {
            local env_name="$1"
            local out_file="$2"
            local raw_value="${!env_name:-}"

            if [[ -z "$raw_value" ]]; then
              echo "Required secret '$env_name' is missing or empty."
              exit 1
            fi

            local compact_value
            compact_value="$(printf '%s' "$raw_value" | tr -d '[:space:]')"

            if ! printf '%s' "$compact_value" | base64 --decode > "$out_file" 2>/dev/null; then
              echo "Secret '$env_name' is not valid base64. Recreate it from the source file and paste full value."
              exit 1
            fi
          }

          decode_secret IOS_P12_BASE64 "$CERTIFICATE_PATH"
          decode_secret IOS_MOBILEPROVISION_BASE64 "$PROFILE_PATH"

      - name: Import certificate and provisioning profile
        shell: bash
        run: |
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "${{ secrets.IOS_P12_PASSWORD }}" -f pkcs12 -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"

          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST_PATH"

          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST_PATH")"
          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PROFILE_PLIST_PATH")"

          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "IOS_PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "IOS_PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Set version variables
        shell: bash
        run: |
          DISPLAY_BASE="$(python3 -c 'import os, xml.etree.ElementTree as ET; root = ET.parse(os.environ["PROJECT_PATH"]).getroot(); print(next((node.text.strip() for group in root.findall("PropertyGroup") for node in [group.find("ApplicationDisplayVersion")] if node is not None and node.text), "1.0"))')"

          BUILD_NUMBER="${{ github.run_number }}"
          echo "VERSION_DISPLAY=$DISPLAY_BASE.$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "VERSION_BUILD=$BUILD_NUMBER" >> "$GITHUB_ENV"

      - name: Restore NuGet packages
        shell: bash
        run: |
          dotnet restore "$PROJECT_PATH" \
            -p:RuntimeIdentifier=ios-arm64

      - name: Publish signed IPA
        shell: bash
        run: |
          dotnet publish "$PROJECT_PATH" \
            -f "$TARGET_FRAMEWORK" \
            -c Release \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:ArchiveOnBuild=true \
            -p:BuildIpa=true \
            -p:ProvisioningType=manual \
            -p:CodesignKey="${{ secrets.IOS_CODESIGN_KEY }}" \
            -p:CodesignProvision="$IOS_PROFILE_NAME" \
            -p:ApplicationDisplayVersion="$VERSION_DISPLAY" \
            -p:ApplicationVersion="$VERSION_BUILD"

      - name: Collect IPA artifact
        shell: bash
        run: |
          mkdir -p "$OUTPUT_DIR"
          PROJECT_DIR="$(dirname "$PROJECT_PATH")"
          IPA_PATH="$(find "$PROJECT_DIR/bin/Release/net10.0-ios" -type f -name "*.ipa" | head -n 1)"

          if [[ -z "$IPA_PATH" ]]; then
            echo "No .ipa file was produced."
            exit 1
          fi

          FINAL_IPA_PATH="$OUTPUT_DIR/$(basename "$IPA_PATH")"
          cp "$IPA_PATH" "$FINAL_IPA_PATH"

          echo "IPA_PATH=$FINAL_IPA_PATH" >> "$GITHUB_ENV"

      - name: Upload iOS IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-appstore-upload
          path: artifacts/ios-appstore
          if-no-files-found: error

      - name: Cleanup signing assets
        if: always()
        shell: bash
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$CERTIFICATE_PATH" "$PROFILE_PATH" "$PROFILE_PLIST_PATH"
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/$IOS_PROFILE_UUID.mobileprovision" || true

  upload-appstore:
    needs: build-ios
    runs-on: macos-15

    steps:
      - name: Download iOS IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa-appstore-upload
          path: downloaded-ipa

      - name: Upload build to App Store Connect
        shell: bash
        run: |
          IPA_PATH="$(find downloaded-ipa -type f -name "*.ipa" | head -n 1)"

          if [[ -z "$IPA_PATH" ]]; then
            echo "No .ipa file was found in the downloaded artifact."
            exit 1
          fi

          ALTOOL_ARGS=(
            --upload-package "$IPA_PATH"
            --platform ios
            --username "${{ secrets.APPSTORE_USERNAME }}"
            --app-password "@env:APPSTORE_APP_PASSWORD"
            --output-format json
            --wait
          )

          APPSTORE_APP_PASSWORD="${{ secrets.APPSTORE_APP_PASSWORD }}" xcrun altool "${ALTOOL_ARGS[@]}"